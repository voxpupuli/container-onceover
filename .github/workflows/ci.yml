---
# Managed by modulesync - DO NOT EDIT
# https://voxpupuli.org/docs/updating-files-managed-with-modulesync/

name: 🚦 CI

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-matrix:
    name: Set up build matrix
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.build-matrix.outputs.build-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1

      - name: Generate build matrix
        id: build-matrix
        run: echo "build-matrix=$(bash matrix.sh build)" >> "$GITHUB_OUTPUT"

  build-container:
    name: Build ${{ matrix.platform }} CI container
    runs-on: ${{ matrix.runner }}
    needs:
      - setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.build-matrix) }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          tags: 'ci/onceover:${{ matrix.rubygem_onceover }}'
          push: false
          platforms: linux/${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            RUBYGEM_BUNDLER=${{ matrix.rubygem_bundler }}
            RUBYGEM_ONCEOVER=${{ matrix.rubygem_onceover }}
            RUBYGEM_ONCEOVER_CODEQUALITY=${{ matrix.rubygem_onceover_codequality }}

      - name: Checkout test repository
        uses: actions/checkout@v7
        with:
          repository: voxpupuli/puppet-example

      - name: Test image
        run: |
          docker run --rm -v "$PWD:/repo:Z" ci/onceover:${{ matrix.rubygem_onceover }} -h

  tests:
    name: Test suite
    if: always()
    needs:
      - setup-matrix
      - build-container
    runs-on: ubuntu-24.04
    steps:
      - name: Verify required jobs
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  dependabot:
    name: Dependabot auto-merge
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    needs:
      - tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --merge "$PR_URL"
